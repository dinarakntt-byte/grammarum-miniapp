<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GRAMMARUM</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#F8F3E8;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

}

.container{

width:90%;

max-width:420px;

background:white;

border-radius:30px;

padding:35px;

box-shadow:0 15px 40px rgba(0,0,0,.15);

text-align:center;

}

.logo{

font-size:54px;

margin-bottom:10px;

}

h1{

font-size:42px;

color:#2563EB;

margin-bottom:10px;

}

.subtitle{

font-size:18px;

color:#555;

margin-bottom:40px;

line-height:28px;

}

button{

width:100%;

padding:18px;

border:none;

border-radius:18px;

font-size:22px;

font-weight:bold;

margin-bottom:18px;

cursor:pointer;

transition:.25s;

}

.play{

background:#2563EB;

color:white;

}

.play:hover{

transform:scale(1.03);

}

.rules{

background:#FACC15;

}

.rules:hover{

transform:scale(1.03);

}

.version{

margin-top:20px;

color:#999;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">🎓</div>

<h1>GRAMMARUM</h1>

<div class="subtitle">

Учебная монополия<br>

по русскому языку

</div>

<button class="play">

🎮 Играть

</button>

<button class="rules">

📖 Правила

</button>

<div class="version">

Версия 1.0

</div>

</div>

</body>

</html>
